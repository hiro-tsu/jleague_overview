name: Update J.League Overview

on:
  # schedule:
  #   # Every 4 hours (UTC)
  #   - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate overview JSON
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_jleague_overview.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A output/jleague_overview.json
          git add -A output/jleague_overview_errors.log || true
          git commit -m "chore: auto-update jleague overview"
          git push

      - name: Show error log on failure
        if: failure()
        run: |
          if [ -f output/jleague_overview_errors.log ]; then
            echo "===== output/jleague_overview_errors.log ====="
            cat output/jleague_overview_errors.log
          else
            echo "No output/jleague_overview_errors.log found"
          fi
